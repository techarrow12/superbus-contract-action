<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Superbus Contract Action showing a Contract Violated PR comment.</title>
  <desc id="desc">A GitHub-style pull request comment card showing a Contract Violated result for src/payments/stripe.ts matching blocked_scope src/payments/**.</desc>
  <rect width="960" height="560" fill="#f6f8fa"/>

  <g transform="translate(88 58)">
    <rect x="0" y="0" width="784" height="444" rx="12" fill="#ffffff" stroke="#d0d7de"/>

    <rect x="0.5" y="0.5" width="783" height="54" rx="12" fill="#f6f8fa"/>
    <path d="M0.5 42h783v12h-783z" fill="#f6f8fa"/>
    <line x1="0" y1="54" x2="784" y2="54" stroke="#d0d7de"/>

    <circle cx="31" cy="27" r="12" fill="#24292f"/>
    <text x="52" y="32" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600">superbus-contract-action</text>
    <text x="233" y="32" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">commented on this pull request</text>

    <rect x="596" y="15" width="152" height="24" rx="12" fill="#ffffff" stroke="#d0d7de"/>
    <text x="617" y="31" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">GitHub PR comment</text>

    <rect x="0" y="54" width="5" height="390" fill="#cf222e"/>

    <g transform="translate(32 88)">
      <text x="0" y="0" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700">Superbus Contract Check</text>

      <g transform="translate(0 34)">
        <rect x="0" y="0" width="172" height="30" rx="15" fill="#ffebe9" stroke="#ff8182"/>
        <text x="17" y="20" fill="#cf222e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">Contract Violated</text>
      </g>

      <text x="0" y="92" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16">This PR changed files outside its Agent Contract.</text>

      <g transform="translate(0 124)">
        <rect x="0" y="0" width="720" height="128" rx="8" fill="#ffebe9" stroke="#ff8182"/>
        <text x="20" y="33" fill="#cf222e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="700" letter-spacing="1.2">VIOLATION</text>
        <rect x="20" y="51" width="680" height="38" rx="6" fill="#ffffff" stroke="#ff8182"/>
        <text x="36" y="76" fill="#cf222e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">src/payments/stripe.ts</text>
        <text x="20" y="111" fill="#cf222e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">matched blocked_scope: src/payments/**</text>
      </g>

      <g transform="translate(0 282)">
        <text x="0" y="0" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="700" letter-spacing="1.2">CHANGED FILES</text>
        <rect x="0" y="16" width="720" height="38" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
        <text x="16" y="41" fill="#24292f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">src/billing/currency.ts</text>
        <rect x="0" y="62" width="720" height="38" rx="6" fill="#ffebe9" stroke="#ff8182"/>
        <text x="16" y="87" fill="#cf222e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700">src/payments/stripe.ts</text>
      </g>

      <g transform="translate(0 404)">
        <rect x="0" y="-28" width="720" height="48" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
        <text x="16" y="-8" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="700" letter-spacing="1.1">RECOMMENDATION</text>
        <text x="16" y="11" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Do not merge until this PR is back inside the contract.</text>
      </g>
    </g>
  </g>
</svg>
